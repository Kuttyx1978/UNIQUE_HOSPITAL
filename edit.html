{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card p-4 p-md-5 border-top border-4 border-primary">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark m-0"><i class="bi bi-pencil-square text-primary me-2"></i>Edit Record</h3>
                <span class="badge bg-secondary rounded-pill">ID: #{{ record[0] }}</span>
            </div>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">Patient Name</label>
                    <input type="text" name="name" class="form-control shadow-sm" value="{{ record[2] }}" required>
                </div>
                
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary small">Date</label>
                        <input type="date" name="date" class="form-control shadow-sm" value="{{ record[6] }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary small">Time</label>
                        <input type="time" name="time" class="form-control shadow-sm text-primary fw-bold" value="{{ record[7] }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary small">Consulting Fee (₹)</label>
                    <input type="number" name="fee" class="form-control shadow-sm text-success fw-bold" value="{{ record[9] }}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary small">Reason / Symptoms</label>
                    <textarea name="reason" class="form-control shadow-sm" rows="3" required>{{ record[8] }}</textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm">Save Changes</button>
                    <a href="/records" class="btn btn-outline-secondary w-100 rounded-pill fw-bold shadow-sm">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
